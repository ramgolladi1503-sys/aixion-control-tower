name: Backend CI

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Lint
        working-directory: backend
        run: ruff check .

      - name: Test
        working-directory: backend
        run: pytest
