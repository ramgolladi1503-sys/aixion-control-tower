name: Android Structure Check

on:
  push:
    paths:
      - 'mobile/android/**'
      - '.github/workflows/mobile-android-ci.yml'
  pull_request:
    paths:
      - 'mobile/android/**'
      - '.github/workflows/mobile-android-ci.yml'

jobs:
  structure-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Android scaffold files
        run: |
          test -f mobile/android/settings.gradle.kts
          test -f mobile/android/build.gradle.kts
          test -f mobile/android/app/build.gradle.kts
          test -f mobile/android/app/src/main/AndroidManifest.xml
          test -f mobile/android/app/src/main/java/com/aixion/controltower/MainActivity.kt
          test -f mobile/android/app/src/main/java/com/aixion/controltower/ControlTowerApp.kt
          echo "Android scaffold structure is present. Add Gradle wrapper before enabling APK build CI."
