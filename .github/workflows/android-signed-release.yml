name: Build signed Android AAB

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "Release/review backend base URL. Must end with /."
        required: true
        default: "https://TODO.example.com/"
      artifact_name:
        description: "Uploaded artifact name"
        required: true
        default: "aixion-control-tower-release-aab"

permissions:
  contents: read

env:
  GRADLE_USER_HOME: ${{ github.workspace }}/.gradle

jobs:
  build-signed-aab:
    name: Build signed release AAB
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required signing secrets
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          missing=0
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required GitHub secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Signed release build cannot continue until all signing secrets are configured."
            exit 1
          fi

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > mobile/android/release.keystore
          chmod 600 mobile/android/release.keystore

      - name: Build signed release AAB
        working-directory: mobile/android
        env:
          ANDROID_KEYSTORE_FILE: release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew bundleRelease -PAIXION_API_BASE_URL=${{ inputs.api_base_url }}

      - name: Upload signed AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: mobile/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 14

      - name: Remove decoded keystore
        if: always()
        shell: bash
        run: rm -f mobile/android/release.keystore
